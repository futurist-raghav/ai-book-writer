steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/scribe-house:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/scribe-house:latest'
      - '-f'
      - 'backend/Dockerfile.prod'
      - 'backend/'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/scribe-house:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/scribe-house:latest'

images:
- 'gcr.io/$PROJECT_ID/scribe-house:$SHORT_SHA'
- 'gcr.io/$PROJECT_ID/scribe-house:latest'

timeout: '3600s'

