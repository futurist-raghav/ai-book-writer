services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aibook-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aibook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aibook_password}
      POSTGRES_DB: ${POSTGRES_DB:-aibook}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aibook}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aibook-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: aibook-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - aibook-network

  # Ollama - Local LLM Inference (for Gemma 4 STT)
  ollama:
    image: ollama/ollama:latest
    container_name: aibook-ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - aibook-network
    # Optional: Limit resources
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aibook-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aibook}:${POSTGRES_PASSWORD:-aibook_password}@postgres:5432/${POSTGRES_DB:-aibook}
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      # Gemma 4 STT Configuration (Auto-Deployed)
      - STT_PROVIDER=gemma4
      - PREFERRED_STT_SERVICE=gemma4
      - GEMMA4_BASE_URL=http://ollama:11434
      - GEMMA4_MODEL=gemma4:latest
      - GEMMA4_AUTO_DEPLOY=true
      - GEMMA4_AUTO_DEPLOY_WAIT_TIMEOUT=900
      - GEMMA4_TIMEOUT_SECONDS=600
      - GEMMA4_TEMPERATURE=0.2
      - GEMMA4_TOP_P=0.85
      - GEMMA4_MAX_TOKENS=8192
      - GEMMA4_AUDIO_SAMPLE_RATE=16000
      - GEMMA4_AUDIO_CHANNELS=1
      - GEMMA4_AUDIO_FORMAT=float32
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - aibook-network

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: aibook-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=False
    ports:
      - "8001:8000"
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - aibook-network

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aibook-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aibook}:${POSTGRES_PASSWORD:-aibook_password}@postgres:5432/${POSTGRES_DB:-aibook}
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - aibook-network

  # Celery Beat (Scheduled Tasks)
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aibook-beat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aibook}:${POSTGRES_PASSWORD:-aibook_password}@postgres:5432/${POSTGRES_DB:-aibook}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app beat --loglevel=info
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - aibook-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aibook-frontend
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:1000/ws
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: >
      sh -c "
        npm cache clean --force &&
        npm install --legacy-peer-deps &&
        rm -rf /app/.next /app/.turbo 2>/dev/null || true &&
        npm run dev
      "
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - aibook-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local
  ollama_data:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local

networks:
  aibook-network:
    driver: bridge
