<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo Icon (left side) -->
  <!-- House outline -->
  <path d="M 15 65 L 45 35 L 75 65 L 75 105 Q 75 110 70 110 L 20 110 Q 15 110 15 105 Z" stroke="#1e3a5f" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Left book edge -->
  <rect x="25" y="50" width="8" height="45" stroke="#1e3a5f" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Right book edge -->
  <rect x="67" y="50" width="8" height="45" stroke="#1e3a5f" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Left page -->
  <rect x="33" y="50" width="12" height="45" stroke="#1e3a5f" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Right page -->
  <rect x="55" y="50" width="12" height="45" stroke="#1e3a5f" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Pen nib (teal) - simplified -->
  <path d="M 44 56 L 47 44 L 50 56 Q 47 66 44 56 Z" fill="url(#tealGradient)"/>
  <path d="M 44 79 L 47 92 L 50 79 Q 47 69 44 79 Z" fill="url(#tealGradient)"/>
  <path d="M 35 70 L 23 72 L 35 74 Q 45 72 35 70 Z" fill="url(#tealGradient)"/>
  <path d="M 55 70 L 67 72 L 55 74 Q 45 72 55 70 Z" fill="url(#tealGradient)"/>
  <circle cx="47" cy="70" r="2" fill="url(#tealGradient)"/>

  <!-- Text -->
  <!-- "Scribe" -->
  <text x="95" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1e3a5f">
    Scribe
  </text>
  
  <!-- "House" -->
  <text x="95" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#4b5563" letter-spacing="-0.5">
    House
  </text>
</svg>
