<svg viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- House outline -->
  <path d="M 30 150 L 120 70 L 210 150 L 210 230 Q 210 240 200 240 L 40 240 Q 30 240 30 230 Z" stroke="#1e3a5f" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Left book edge -->
  <rect x="50" y="100" width="20" height="100" stroke="#1e3a5f" stroke-width="6" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Right book edge -->
  <rect x="170" y="100" width="20" height="100" stroke="#1e3a5f" stroke-width="6" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Left page -->
  <rect x="70" y="100" width="30" height="100" stroke="#1e3a5f" stroke-width="5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Right page -->
  <rect x="140" y="100" width="30" height="100" stroke="#1e3a5f" stroke-width="5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Pen nib (teal color) -->
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Pen nib top -->
  <path d="M 105 110 L 110 90 L 115 110 Q 110 125 105 110 Z" fill="url(#tealGradient)"/>
  
  <!-- Pen nib bottom -->
  <path d="M 105 150 L 110 200 L 115 150 Q 110 135 105 150 Z" fill="url(#tealGradient)"/>
  
  <!-- Pen nib left -->
  <path d="M 85 135 L 65 140 L 85 145 Q 100 140 85 135 Z" fill="url(#tealGradient)"/>
  
  <!-- Pen nib right -->
  <path d="M 135 135 L 155 140 L 135 145 Q 120 140 135 135 Z" fill="url(#tealGradient)"/>
  
  <!-- Center diamond/quill shape -->
  <path d="M 110 130 L 115 120 L 125 130 L 115 145 Z" fill="url(#tealGradient)"/>
  <circle cx="110" cy="132" r="3" fill="url(#tealGradient)"/>
  <circle cx="120" cy="132" r="3" fill="url(#tealGradient)"/>
</svg>
